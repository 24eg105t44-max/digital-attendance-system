<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Student Attendance Management System</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/login.css">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>

    <div class="overlay"></div>

    <!-- Live Date & Time -->
    <div class="datetime-box">

        <div id="currentDate"></div>

        <div id="currentTime"></div>

    </div>

    <div class="login-container">

        <!-- Logo -->
        <div class="logo">
            <i class="fa-solid fa-user-graduate"></i>
        </div>

        <h1>Student Attendance</h1>
        <h3>Management System</h3>

        <h4 class="login-title">
            <i class="fa-solid fa-user-lock"></i>
            Login Portal
        </h4>

        <form id="loginForm">

            <!-- Login Role -->
            <div class="input-box">

                <i class="fa-solid fa-users"></i>

                <select id="loginType" required>

                    <option value="admin">Admin Login</option>

                    <option value="student">Student Login</option>

                </select>

            </div>

            <!-- Username -->
            <div class="input-box">

                <i class="fa-solid fa-user"></i>

                <input
                    type="text"
                    id="username"
                    placeholder="Enter Username / Roll No"
                    autocomplete="off"
                    required>

            </div>

            <!-- Password -->
            <div class="input-box">

                <i class="fa-solid fa-lock"></i>

                <input
                    type="password"
                    id="password"
                    placeholder="Enter Password"
                    required>

                <span id="togglePassword">

                    <i class="fa-solid fa-eye"></i>

                </span>

            </div>

            <!-- Options -->
            <div class="options">

                <label>

                    <input type="checkbox">

                    Remember Me

                </label>

                <a href="#" id="forgotPassword">
                    Forgot Password?
                </a>

            </div>

            <!-- Login -->
            <button class="login-btn" type="submit">

                <i class="fa-solid fa-right-to-bracket"></i>

                Login

            </button>

            <p id="error"></p>

        </form>

        <!-- Sign Up Button -->
        <div class="signup-box">

            <span>New Student?</span>

            <button id="signupBtn" class="signup-btn">

                <i class="fa-solid fa-user-plus"></i>

                Sign Up

            </button>

        </div>

        <hr style="margin:20px 0; opacity:.3;">

        <!-- Demo Credentials -->

        <div style="color:white;font-size:14px;line-height:1.8;">

            <strong>Demo Login Credentials</strong>

            <br><br>

            👨‍💼 <b>Admin</b><br>

            Username : admin<br>

            Password : admin123

            <br><br>

            👨‍🎓 <b>Student</b><br>

            Roll No : 23CSE001<br>

            Password : rahul123

        </div>

        <div class="footer">

            © 2026 Student Attendance Management System

        </div>

    </div>

    <script src="js/login.js"></script>

</body>

</html>
