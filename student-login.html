<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login</title>

    <link rel="stylesheet" href="css/login.css">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>

    <div class="overlay"></div>

    <div class="login-container">

        <div class="logo">
            <i class="fa-solid fa-user-graduate"></i>
        </div>

        <h1>Student Login</h1>
        <h3>Attendance Management System</h3>

        <form id="studentLoginForm">

            <div class="input-box">
                <i class="fa-solid fa-user"></i>
                <input type="text" id="roll" placeholder="Enter Roll Number" required>
            </div>

            <div class="input-box">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="password" placeholder="Enter Password" required>
            </div>

            <button type="submit" class="login-btn">
                <i class="fa-solid fa-right-to-bracket"></i>
                Login
            </button>

            <p id="error"></p>

        </form>

        <div class="footer">
            © 2026 Student Attendance Management System
        </div>

    </div>

    <script>
        const form = document.getElementById("studentLoginForm");
        const roll = document.getElementById("roll");
        const password = document.getElementById("password");
        const error = document.getElementById("error");

        form.addEventListener("submit", function (e) {
            e.preventDefault();

            let students = JSON.parse(localStorage.getItem("students")) || [];

            const student = students.find(s =>
                s.roll === roll.value.trim() &&
                s.password === password.value.trim()
            );

            if (!student) {
                error.style.color = "red";
                error.innerText = "Invalid Roll No or Password";
                return;
            }

            localStorage.setItem("loggedIn", "true");
            localStorage.setItem("studentRoll", student.roll);

            window.location.href = "student-dashboard.html";
        });
    </script>

</body>

</html>
