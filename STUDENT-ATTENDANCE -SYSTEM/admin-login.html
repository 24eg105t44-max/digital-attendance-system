<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>

    <link rel="stylesheet" href="css/login.css">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>

    <div class="overlay"></div>

    <div class="login-container">

        <div class="logo">
            <i class="fa-solid fa-user-shield"></i>
        </div>

        <h1>Admin Login</h1>
        <h3>Student Attendance Management System</h3>

        <form id="adminLoginForm">

            <div class="input-box">
                <i class="fa-solid fa-user"></i>
                <input type="text" id="username" placeholder="Enter Admin Username" required>
            </div>

            <div class="input-box">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="password" placeholder="Enter Password" required>
            </div>

            <button type="submit" class="login-btn">
                <i class="fa-solid fa-right-to-bracket"></i>
                Login
            </button>

            <p id="error"></p>

        </form>

        <div class="footer">
            © 2026 Student Attendance Management System
        </div>

    </div>

    <script>
        const form = document.getElementById("adminLoginForm");
        const username = document.getElementById("username");
        const password = document.getElementById("password");
        const error = document.getElementById("error");

        const ADMIN_USER = "admin";
        const ADMIN_PASS = "admin123";

        form.addEventListener("submit", function (e) {
            e.preventDefault();

            if (
                username.value.trim() === ADMIN_USER &&
                password.value.trim() === ADMIN_PASS
            ) {
                localStorage.setItem("loggedIn", "true");
                localStorage.setItem("role", "admin");

                window.location.href = "dashboard.html";
            } else {
                error.style.color = "red";
                error.innerText = "Invalid Admin Credentials";
            }
        });
    </script>

</body>

</html>
